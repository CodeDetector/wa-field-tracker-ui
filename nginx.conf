server {
    listen 80;

    # Use Docker's embedded DNS so nginx re-resolves upstream container IPs
    # instead of caching them at startup. Without this, restarting omni-backend
    # (which gives it a new IP on the bridge network) makes nginx proxy to the
    # dead IP until omni-ui itself is restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Assigning the upstream to a variable forces nginx to resolve it per
        # request (via the resolver above) rather than once at startup.
        set $upstream_backend "omni-backend:3000";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
